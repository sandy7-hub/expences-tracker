<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color: rgb(254, 147, 224);">

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <h2 class="text-center mb-4">💸 Expense Tracker</h2>

    
        <form method="POST">

            <div class="row g-3">

                <div class="col-md-3">
                    <input type="number"
                           name="amount"
                           class="form-control"
                           placeholder="Amount"
                           required>
                </div>

                <div class="col-md-3">
                    <input type="text"
                           name="category"
                           class="form-control"
                           placeholder="Category"
                           required>
                </div>

                <div class="col-md-3">
                    <input type="text"
                           name="description"
                           class="form-control"
                           placeholder="Description"
                           required>
                </div>

                <div class="col-md-3">
                    <input type="date"
                           name="date"
                           class="form-control"
                           required>
                </div>

            </div>

            <button class="btn btn-success mt-4">
                Add Expense
            </button>

        </form>

        <hr>

        <h4>Total Spending = ₹{{total}}</h4>

        <h5>{{ message }}</h5>


        <div class="mt-4">

            <h3 class="text-center mb-3">
                All Expenses List
            </h3>

            {% for expense in expenses %}

            <div class="card mb-3 p-3">

                <h5>
                    ₹{{ expense.amount }}
                </h5>

                <p>
                    {{ expense.category }}
                    -
                    {{ expense.description }}
                </p>

                <small>
                    {{ expense.date }}
                </small>

                <div class="mt-2">

                    <a href="/edit/{{ expense.id }}"
                       class="btn btn-primary btn-sm">
                        Edit
                    </a>

                    <a href="/delete/{{ expense.id }}"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

</body>
</html>
